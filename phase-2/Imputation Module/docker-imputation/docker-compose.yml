services:
  imputer:
    build:
      context: ../../..
      dockerfile: "phase-2/Imputation Module/docker-imputation/Dockerfile"
    image: rd-imputer:latest
    container_name: rd_imputer
    volumes:
      # Historical + weather CSVs (read-only)
      - ../../Data:/data:ro
      # Recent HA CSV lives at the project root; bind-mount into a separate
      # target dir (can't stack a file mount inside the read-only /data)
      - "../../../Cons_Hotel Academic_2026-03-22_2026-04-10.csv:/recent/Cons_Hotel Academic_2026-03-22_2026-04-10.csv:ro"
      # Input/output exchange dir
      - ./io:/io
      # Persistent cache for hybrid_templates_cache.pkl
      - ./cache:/app/cache
    command: ["--input", "/io/input.csv", "--output", "/io/output.csv"]
