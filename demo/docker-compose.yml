version: "3.7"

services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo_pipeline
    volumes:
      # Full project tree (read-only) so config.py path resolution works
      - ..:/app:ro
      # Writable output directory (overlays the read-only mount)
      - ./output:/app/demo/output
    working_dir: /app/demo
    env_file:
      - path: .env
        required: false
