services:
  imputer:
    build:
      context: ../..
      dockerfile: "Imputation-Module/docker-imputation/Dockerfile"
    image: rd-imputer:latest
    container_name: rd_imputer
    volumes:
      # Historical + weather CSVs and the recent HA CSV (read-only)
      - ../../data:/data:ro
      # Input/output exchange dir
      - ./io:/io
      # Persistent cache for hybrid_templates_cache.pkl
      - ./cache:/app/cache
    environment:
      CASSANDRA_HOSTS: ${CASSANDRA_HOSTS:-cassandra-single-node}
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME:-}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD:-}
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-previsions_data}
    env_file:
      - path: .env
        required: false
    networks:
      - cassandra_net
    command: ["--source", "csv", "--input", "/io/input.csv", "--output", "/io/output.csv"]

networks:
  cassandra_net:
    external: true
    name: cassandra_default
