services:
  imputer:
    build:
      context: ../..
      dockerfile: "Imputation-Module/docker-imputation/Dockerfile"
    image: rd-imputer:latest
    container_name: rd_imputer
    volumes:
      - ../../data:/data:ro
      - ./io:/io
      - ./cache:/app/cache
    environment:
      CASSANDRA_HOSTS: ${CASSANDRA_HOSTS:-cassandra-single-node}
      CASSANDRA_USERNAME: ${CASSANDRA_USERNAME:-}
      CASSANDRA_PASSWORD: ${CASSANDRA_PASSWORD:-}
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-previsions_data}
      TZ: Europe/Paris
      SCHEDULE_HOUR: ${SCHEDULE_HOUR:-23}
      SCHEDULE_MINUTE: ${SCHEDULE_MINUTE:-50}
    env_file:
      - path: .env
        required: false
    networks:
      - cassandra_net
    restart: unless-stopped

networks:
  cassandra_net:
    external: true
    name: cassandra_default
